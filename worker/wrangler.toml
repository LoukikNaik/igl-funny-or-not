name = "igl-api"
main = "src/index.js"
compatibility_date = "2024-11-01"

# Serve the API at iglapi.loukik.dev (wrangler provisions the DNS + cert since
# loukik.dev is on this Cloudflare account).
routes = [
  { pattern = "iglapi.loukik.dev", custom_domain = true }
]

[vars]
ALLOWED_ORIGIN = "https://igl.loukik.dev"
# STATS_KEY, TURNSTILE_SECRET, SESSION_SECRET are set as secrets (wrangler secret put ...)
BLOCKED_IPS = "101.0.63.11"
# Require a valid proof-of-human session on votes. Kept "false" during rollout,
# flip to "true" once the frontend is confirmed shipping x-igl-session.
ENFORCE_SESSION = "false"

# D1 database (id filled in after `wrangler d1 create igl-votes`)
[[d1_databases]]
binding = "DB"
database_name = "igl-votes"
database_id = "392b2731-47f7-42a7-bc12-173c4129b3f9"
